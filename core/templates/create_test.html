<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Yaratish - Savollar Banki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: white;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1>📚 Test Yaratish - Savollar Banki</h1>
            <p class="lead">O'qituvchi paneli - Yangi test va savollar qo'shish</p>
        </div>

        <div class="card p-5 mx-auto" style="max-width: 800px;">
            <form method="post">
                <div class="mb-4">
                    <label class="form-label fs-5">Test nomi</label>
                    <input name="title" class="form-control form-control-lg" placeholder="Masalan: Matematika - 9-sinf" required>
                </div>

                <h4 class="mt-5 mb-3">Savollar qo'shish (bir vaqtda 5 ta)</h4>

                <!-- Savol 1 -->
                <div class="card mb-4 p-4 bg-dark">
                    <h5>Savol 1</h5>
                    <textarea name="q_text_1" class="form-control mb-2" rows="2" placeholder="Savol matnini yozing" required></textarea>
                    <select name="q_type_1" class="form-select mb-2">
                        <option value="mcq">Yopiq savol (Ko'p variantli)</option>
                        <option value="open">Ochiq savol (NLP bilan baholanadi)</option>
                    </select>
                    <input name="correct_1" class="form-control" placeholder="To'g'ri javob" required>
                </div>

                <!-- Savol 2 -->
                <div class="card mb-4 p-4 bg-dark">
                    <h5>Savol 2</h5>
                    <textarea name="q_text_2" class="form-control mb-2" rows="2" placeholder="Savol matnini yozing"></textarea>
                    <select name="q_type_2" class="form-select mb-2">
                        <option value="mcq">Yopiq savol</option>
                        <option value="open">Ochiq savol</option>
                    </select>
                    <input name="correct_2" class="form-control" placeholder="To'g'ri javob">
                </div>

                <!-- Savol 3-5 ham xuddi shu tarzda (qisqartirdim, kerak bo'lsa to'liq beraman) -->

                <button type="submit" class="btn btn-primary btn-lg w-100 py-3 mt-4">
                    Testni saqlash va savollarni qo'shish
                </button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="/test/" class="btn btn-outline-light">Test topshirish bo'limiga o'tish</a>
            <a href="/logout/" class="btn btn-outline-danger">Chiqish</a>
        </div>
    </div>
</body>
</html>
