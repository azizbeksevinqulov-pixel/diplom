{% extends 'base.html' %}
{% block title %}{{ test.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="text-center mb-5">{{ test.title }}</h2>
        <form method="post">
            {% for q in questions %}
            <div class="card mb-4 p-4">
                <h5>{{ q.text }}</h5>
                <small class="text-info">
                    {% if q.question_type in 'mcq truefalse' %}Yopiq savol{% else %}Ochiq savol (NLP bilan baholanadi){% endif %}
                </small>
                <input name="{{ q.id }}" class="form-control mt-3" placeholder="Javobingiz..." required>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-success btn-lg w-100 py-3">Testni yakunlash va natijani ko'rish</button>
        </form>
    </div>
</div>
{% endblock %}
